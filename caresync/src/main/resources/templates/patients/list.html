<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header_extras}">
    <title>CareSync - Pacijenti</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">

        <h2>Baza pacijenata</h2>
        <a href="/patients/add" class="btn btn-primary">+ Registruj novog</a>
    </div>

    <table class="styled-table">
        <thead>
        <tr>
            <th>Ime i prezime</th>
            <th>JMBG</th>
            <th>Email</th>
            <th>Telefon</th>
            <th>Akcije</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${patients}">
            <td th:text="${p.firstName + ' ' + p.lastName}"></td>
            <td th:text="${p.jmbg}"></td>
            <td th:text="${p.email}"></td>
            <td th:text="${p.phone}"></td>
            <td>
                <button class="btn-secondary"
                        style="padding: 5px 10px; border-radius: 4px; border:none; cursor:pointer; margin-right: 5px; background: #3b82f6; color: white;"
                        th:onclick="openEditPatientModal([[${p.id}]], [[${p.firstName}]], [[${p.lastName}]], [[${p.jmbg}]], [[${p.email}]], [[${p.phone}]])">
                    Izmeni
                </button>
                <a th:href="@{/patients/delete/{id}(id=${p.id})}" class="btn-danger" style="padding: 5px 10px; border-radius: 4px; text-decoration: none;">Obriši</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div id="editPatientModal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div class="card-form" style="margin:5% auto; width:500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <h3 style="margin-top:0; color: var(--primary); border-bottom: 2px solid #f1f5f9; padding-bottom: 15px;">
            <i class="fas fa-user-edit"></i> Izmena pacijenta
        </h3>

        <form action="/patients/save" method="POST">            <input type="hidden" name="id" id="editId">

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>Ime</label>
                    <input type="text" name="firstName" id="editFirstName" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Prezime</label>
                    <input type="text" name="lastName" id="editLastName" class="form-control" required>
                </div>
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label>JMBG</label>
                <input type="text" name="jmbg" id="editJmbg" class="form-control"
                       required pattern="\d{13}" maxlength="13"
                       title="JMBG mora sadržati tačno 13 cifara.">
            </div>

            <div class="form-group" style="margin-top: 15px;">
                <label>Email</label>
                <input type="email" name="email" id="editEmail" class="form-control">
            </div>

            <div class="form-group" style="margin-top: 15px; margin-bottom: 20px;">
                <label>Telefon</label>
                <input type="text" name="phone" id="editPhone" class="form-control">
            </div>

            <div style="display:flex; gap:10px;">
                <button type="submit" class="btn btn-primary" style="flex:2;">Sačuvaj izmene</button>
                <button type="button" onclick="closeEditModal()" class="btn btn-secondary" style="flex:1;">Odustani</button>
            </div>
        </form>
    </div>
</div>
<input type="hidden" id="errorValue" th:value="${error}">

<script th:inline="javascript">
    // Ova funkcija se pokreće čim se stranica učita
    window.onload = function() {
        const errorMsg = document.getElementById('errorValue').value;
        if (errorMsg && errorMsg.trim() !== "") {
            Swal.fire({
                icon: 'error',
                title: 'Greška pri izmeni',
                text: errorMsg,
                confirmButtonColor: '#3b82f6'
            });
        }
    }

    // Tvoje postojeće funkcije za modal...
    function openEditPatientModal(id, firstName, lastName, jmbg, email, phone) {
        document.getElementById('editId').value = id;
        document.getElementById('editFirstName').value = firstName;
        document.getElementById('editLastName').value = lastName;
        document.getElementById('editJmbg').value = jmbg;
        document.getElementById('editEmail').value = email;
        document.getElementById('editPhone').value = phone;
        document.getElementById('editPatientModal').style.display = 'block';
    }

    function closeEditModal() {
        document.getElementById('editPatientModal').style.display = 'none';
    }

    window.onclick = function(event) {
        const modal = document.getElementById('editPatientModal');
        if (event.target == modal) closeEditModal();
    }
</script>
</body>
</html>

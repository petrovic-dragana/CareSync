<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: header_extras}">
    <title>CareSync | Registracija pacijenta</title>
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>

<div class="container">
    <div class="card-form">
        <h2 style="margin-top: 0; color: var(--primary); border-bottom: 2px solid #f1f5f9; padding-bottom: 15px;">
            <i class="fas fa-user-plus"></i> Registracija novog pacijenta
        </h2>

        <form th:action="@{/patients/save}" th:object="${patient}" method="POST" style="margin-top: 20px;">

            <div class="form-group">
                <label>Ime pacijenta</label>
                <input type="text" th:field="*{firstName}" placeholder="Unesite ime..." required>
            </div>

            <div class="form-group">
                <label>Prezime pacijenta</label>
                <input type="text" th:field="*{lastName}" placeholder="Unesite prezime..." required>
            </div>

            <div class="form-group">
                <label>JMBG (13 cifara)</label>
                <input type="text" th:field="*{jmbg}" placeholder="Unesite JMBG..." maxlength="13" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="Unesite email..." maxlength="50" required>
            </div>
            <div class="form-group">
                <label>Telefon</label>
                <input type="phone" th:field="*{phone}" placeholder="Unesite broj telefona..." maxlength="15" required>

            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button type="submit" class="btn btn-primary" style="flex: 2;">
                    <i class="fas fa-save"></i> Sačuvaj pacijenta
                </button>
                <a href="/patients" class="btn btn-secondary" style="flex: 1; text-align: center;">Otkaži</a>
            </div>
        </form>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
